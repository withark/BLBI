name: Auto PR

on:
  push:
    branches:
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  open-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Open or update PR to main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = context.ref.replace("refs/heads/", "");
            const base = "main";

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base
            });

            const title = `Auto PR: ${head} -> ${base}`;
            const body = [
              "This pull request was opened automatically from a `codex/**` branch.",
              "",
              `- Source branch: \`${head}\``,
              `- Target branch: \`${base}\``,
              "",
              "CI will continue to run on every push."
            ].join("\n");

            if (pulls.length > 0) {
              core.info(`PR already exists: #${pulls[0].number}`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pulls[0].number,
                title,
                body
              });
              return;
            }

            const { data: pull } = await github.rest.pulls.create({
              owner,
              repo,
              head,
              base,
              title,
              body
            });

            core.info(`Created PR #${pull.number}`);
