name: Nightly Check

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run remote check
        run: npm run check
