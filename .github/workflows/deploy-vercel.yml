name: Deploy Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-config:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.verify.outputs.ready }}
    steps:
      - name: Verify deployment secrets
        id: verify
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=""

          if [ -z "$VERCEL_TOKEN" ]; then
            missing="$missing VERCEL_TOKEN"
          fi

          if [ -z "$VERCEL_ORG_ID" ]; then
            missing="$missing VERCEL_ORG_ID"
          fi

          if [ -z "$VERCEL_PROJECT_ID" ]; then
            missing="$missing VERCEL_PROJECT_ID"
          fi

          if [ -n "$missing" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped. Missing:$missing" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "Deploy configuration is ready." >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: check-config
    if: ${{ needs.check-config.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build deployment artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
